specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Blue Owl Capital
providerId: blue-owl-capital
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Alternative Asset Management
  - Private Credit
description: 'FOCUS-aligned FinOps placeholder for Blue Owl Capital: not a developer-facing platform.
  Spend with Blue Owl is captured as fund-level fees (management fee + incentive fee) across its
  Credit, Real Assets, and GP Strategic Capital platforms.'
sources:
  - https://www.blueowl.com
notes: Blue Owl has no public API billing surface; this artifact exists for symmetry and should be
  revisited only if a developer offering launches.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Blue Owl Capital Inc.
serviceCategory: Alternative Asset Management
billingModel:
  pricingCategory: Fund Fees (Management + Incentive)
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Blue Owl Capital
  ServiceCategory: Alternative Asset Management
  ProviderName: Blue Owl Capital
  PublisherName: Blue Owl Capital Inc.
  InvoiceIssuerName: Blue Owl Capital Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: management_fees
    unit: USD
    aggregation: sum
    dimensions:
      - platform
      - fund
  - name: incentive_fees
    unit: USD
    aggregation: sum
    dimensions:
      - platform
      - fund
  - name: aum_under_management
    unit: USD
    aggregation: avg
    dimensions:
      - platform
principles:
  - name: Visibility
    description: Use LP capital-account statements and quarterly fund reports from Blue Owl
      Investor Relations.
  - name: Allocation
    description: Map fund commitments to consuming entities through the LP reporting pack.
  - name: Optimization
    description: Negotiate side-letter fee discounts at commitment time; consolidate commitments
      across affiliates to reach fee-tier breakpoints.
  - name: Accountability
    description: Designate an LP-relations owner per fund commitment; review quarterly fund
      performance and fee burn.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
