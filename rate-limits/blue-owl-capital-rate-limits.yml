providerId: blue-owl-capital
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Alternative Asset Management
  - Private Credit
  - Rate Limiting
description: Blue Owl Capital does not publish an API rate-limit policy. The firm is an asset
  manager rather than a developer-facing platform; integration controls live inside LP / advisor
  contracts.
sources:
  - https://www.blueowl.com
notes: No public API rate-limit documentation identified.
responseCodes:
  throttled: 429
limits:
  - name: Partner / LP integration
    scope: contract
    metric: varies
    limit: see partner / LP agreement
    notes: Numeric throttling, concurrency, and quota windows governed by individual partner
      contracts; no public values exist.
policies:
  - name: Backoff
    description: Clients receiving a 429 should respect Retry-After when present and apply
      exponential backoff with jitter.
  - name: Contractual escalation
    description: Throttling adjustments and quota raises are handled through the Blue Owl
      relationship contact rather than self-service.
maintainers:
